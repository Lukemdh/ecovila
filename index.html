<!doctype html>
<html lang="ro">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoVila | Lucrăm la îmbunătățirea site-ului</title>
  <meta name="description" content="Site-ul EcoVila este în lucru. Pentru rezervări sunați la 060120220.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #2f2f2b;
      --muted: #6b6b63;
      --line: #cfcabb;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: clamp(2rem, 6vw, 5rem) 1.5rem;
    }

    .maint__logo {
      width: clamp(160px, 22vw, 240px);
      height: auto;
      margin-bottom: clamp(2.5rem, 8vw, 5rem);
    }

    .maint__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1.1;
      margin: 0 0 clamp(2rem, 5vw, 3rem);
      max-width: 14ch;
    }

    .maint__contact {
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .maint__contact a {
      color: inherit;
      text-decoration: none;
    }

    .maint__contact a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <img src="/assets/logo.png" alt="EcoVila" class="maint__logo">
  <h1 class="maint__title">Lucrăm la îmbunătățirea site-ului</h1>
  <p class="maint__contact">Pentru rezervări: <a href="tel:060120220">060120220</a></p>
</body>

</html>
