<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoVila | În curând</title>
  <meta name="description" content="Site-ul EcoVila este în curs de îmbunătățire.">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F4EF;
      --ink: #332F2C;
      --muted: #6E6760;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
      color: var(--ink);
      background: var(--paper);
      font-family: "Montserrat", Helvetica, sans-serif;
      text-align: center;
    }

    main {
      display: grid;
      justify-items: center;
      gap: 24px;
    }

    img {
      display: block;
      width: min(180px, 42vw);
      height: auto;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      font-weight: 500;
      line-height: 1.05;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/logo.png" alt="EcoVila">
    <h1>Lucrăm la îmbunătățirea site-ului</h1>
  </main>
</body>
</html>
